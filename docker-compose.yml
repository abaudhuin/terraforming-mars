services:
  terraforming-mars:
    container_name: terraforming-mars
    build: ./
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:${TM_PORT:-18080}:8080"
    security_opt:
      - no-new-privileges:true
    volumes:
      - tm-db:/usr/src/app/db

  cloudflared:
    container_name: terraforming-mars-cloudflared
    image: cloudflare/cloudflared:2026.6.1
    profiles:
      - cloudflare
    user: "${TM_CLOUDFLARED_UID:-1000}:${TM_CLOUDFLARED_GID:-1000}"
    restart: unless-stopped
    depends_on:
      - terraforming-mars
    command: tunnel --config /etc/cloudflared/tm-f5qn.yml run
    volumes:
      - "${HOME}/.cloudflared:/etc/cloudflared:ro"

volumes:
  tm-db:
